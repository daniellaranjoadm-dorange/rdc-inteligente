<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Acesso não permitido</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; color: #222; }
        .box { max-width: 720px; margin: 0 auto; padding: 24px; border: 1px solid #ddd; border-radius: 12px; }
        h1 { margin-top: 0; }
        .muted { color: #666; }
        a { text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Acesso não permitido</h1>
        <p>Seu usuário está autenticado, mas ainda não possui um perfil operacional ativo para executar esta ação.</p>
        <p class="muted">Peça ao administrador para vincular seu usuário a um funcionário e habilitar seu perfil operacional.</p>
        <p><a href="/">Voltar para a página inicial</a></p>
    </div>
</body>
</html>
