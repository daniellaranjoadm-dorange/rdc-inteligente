<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDC Mobile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .mobile-header {
            background: #0d1b2a;
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mobile-header-title {
            font-size: 16px;
            font-weight: 600;
        }

        .mobile-content {
            padding: 12px;
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="mobile-header">
    <div class="mobile-header-title">RDC Mobile</div>
    <div style="font-size:12px;">{{ request.user.username }}</div>
</div>

<div class="mobile-content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
