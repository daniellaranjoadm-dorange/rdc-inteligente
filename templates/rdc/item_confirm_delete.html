{% extends "base.html" %}
{% block content %}
<div class="container px-0" style="max-width: 760px;">
    <div class="card border-danger shadow-sm">
        <div class="card-header bg-danger text-white">Confirmar exclusão</div>
        <div class="card-body">
            <h4 class="mb-3">Deseja excluir {{ object_label|lower }} deste RDC?</h4>
            <form method="post" class="mt-3">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Sim, excluir</button>
                <a href="{{ cancel_url }}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
